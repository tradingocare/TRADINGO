name: tradingo-prod

services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: always
    logging:
      driver: awslogs
      options:
        awslogs-group: /tradingo/prod/postgres
        awslogs-region: us-east-1
        awslogs-stream-prefix: postgres

  redis:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: always
    logging:
      driver: awslogs
      options:
        awslogs-group: /tradingo/prod/redis
        awslogs-region: us-east-1
        awslogs-stream-prefix: redis

  api:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    restart: always
    logging:
      driver: awslogs
      options:
        awslogs-group: /tradingo/prod/api
        awslogs-region: us-east-1
        awslogs-stream-prefix: api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    restart: always
    logging:
      driver: awslogs
      options:
        awslogs-group: /tradingo/prod/web
        awslogs-region: us-east-1
        awslogs-stream-prefix: web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    restart: always
    logging:
      driver: awslogs
      options:
        awslogs-group: /tradingo/prod/nginx
        awslogs-region: us-east-1
        awslogs-stream-prefix: nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
