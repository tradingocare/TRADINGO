global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'tradingo'
    monitor: 'tradingo-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      scheme: http
      timeout: 10s
      api_version: v2

rule_files:
  - 'alerting-rules.yml'

scrape_configs:
  - job_name: 'tradingo-api'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'api:3001'
        labels:
          service: 'api'
          environment: 'production'
    relabel_configs:
      - source_labels: ['__address__']
        target_label: 'instance'
      - source_labels: ['__meta_ecs_task_definition_family']
        target_label: 'task_family'
    metric_relabel_configs:
      - source_labels: ['__name__']
        regex: '(api_http_requests_total|api_http_request_duration_seconds|api_http_request_duration_seconds_bucket|api_http_request_duration_seconds_count|api_http_request_duration_seconds_sum|api_errors_total|api_errors_total|process_.*)'
        action: 'keep'

  - job_name: 'tradingo-web'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'web:3000'
        labels:
          service: 'web'
          environment: 'production'
    relabel_configs:
      - source_labels: ['__address__']
        target_label: 'instance'

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          job: 'node-exporter'
          environment: 'production'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
        labels:
          job: 'postgres-exporter'
          environment: 'production'
    metric_relabel_configs:
      - source_labels: ['__name__']
        regex: '(pg_stat_database_numbackends|pg_stat_database_xact_commit|pg_stat_database_xact_rollback|pg_stat_bgwriter_buffers_backend|pg_stat_activity_count|pg_locks_count|pg_replication_lag|pg_database_size_bytes|pg_settings_max_connections)'
        action: 'keep'

  - job_name: 'redis-exporter'
    static_configs:
      - targets:
          - 'redis-exporter:9121'
        labels:
          job: 'redis-exporter'
          environment: 'production'
    metric_relabel_configs:
      - source_labels: ['__name__']
        regex: '(redis_up|redis_uptime_in_seconds|redis_memory_used_bytes|redis_memory_max_bytes|redis_keyspace_hits_total|redis_keyspace_misses_total|redis_connected_clients|redis_db_keys|redis_db_keys_expiring)'
        action: 'keep'

  - job_name: 'opensearch-exporter'
    static_configs:
      - targets:
          - 'opensearch-exporter:9108'
        labels:
          job: 'opensearch-exporter'
          environment: 'production'
    metric_relabel_configs:
      - source_labels: ['__name__']
        regex: '(es_cluster_status|es_nodes_process_cpu_percent|es_indices_docs_count|es_indices_store_size_bytes|es_indices_search_query_time_ms|es_indices_indexing_index_time_ms)'
        action: 'keep'
    scrape_timeout: 30s

  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          job: 'prometheus'
          environment: 'production'

  - job_name: 'alertmanager'
    static_configs:
      - targets:
          - 'alertmanager:9093'
        labels:
          job: 'alertmanager'
          environment: 'production'

  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - 'cadvisor:8080'
        labels:
          job: 'cadvisor'
          environment: 'production'

  - job_name: 'aws-ecs-exporter'
    static_configs:
      - targets:
          - 'aws-ecs-exporter:9109'
        labels:
          job: 'aws-ecs-exporter'
          environment: 'production'

recording_rules:
  - name: api_latency
    rules:
      - record: job:api_http_request_duration_seconds_mean:rate5m
        expr: |
          rate(api_http_request_duration_seconds_sum[5m])
          /
          rate(api_http_request_duration_seconds_count[5m])

      - record: job:api_http_request_duration_seconds_p50:rate5m
        expr: |
          histogram_quantile(0.50,
            sum(rate(api_http_request_duration_seconds_bucket[5m])) by (le)
          )

      - record: job:api_http_request_duration_seconds_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum(rate(api_http_request_duration_seconds_bucket[5m])) by (le)
          )

      - record: job:api_http_request_duration_seconds_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum(rate(api_http_request_duration_seconds_bucket[5m])) by (le)
          )

  - name: api_error_rate
    rules:
      - record: job:api_error_rate:rate5m
        expr: |
          sum(rate(api_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(api_http_requests_total[5m]))
          * 100

  - name: api_request_rate
    rules:
      - record: job:api_request_rate:rate5m
        expr: sum(rate(api_http_requests_total[5m]))

      - record: job:api_request_rate:rate1m
        expr: sum(rate(api_http_requests_total[1m]))

  - name: redis_cache_hit_ratio
    rules:
      - record: job:redis_cache_hit_ratio:rate5m
        expr: |
          sum(rate(redis_keyspace_hits_total[5m]))
          /
          (sum(rate(redis_keyspace_hits_total[5m])) + sum(rate(redis_keyspace_misses_total[5m])))
          * 100

  - name: redis_memory_usage
    rules:
      - record: job:redis_memory_usage_percent:current
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes * 100

  - name: postgres_connection_usage
    rules:
      - record: job:postgres_connection_usage_percent:current
        expr: |
          pg_stat_database_numbackends / pg_settings_max_connections * 100

  - name: api_health_checks
    rules:
      - record: job:api_up:current
        expr: up{job="tradingo-api"}

      - record: job:web_up:current
        expr: up{job="tradingo-web"}
