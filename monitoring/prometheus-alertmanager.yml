global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX'

route:
  receiver: default
  group_by: ['alertname', 'severity', 'service']
  group_wait: 10s
  group_interval: 2m
  repeat_interval: 5m
  routes:
    - match:
        severity: critical
      receiver: pagerduty-critical
      repeat_interval: 5m
      continue: true
    - match:
        severity: warning
      receiver: slack-warning
      repeat_interval: 30m
    - match:
        severity: info
      receiver: email-info
      repeat_interval: 6h

receivers:
  - name: default
    slack_configs:
      - channel: '#alerts'
        title: '{{ .Status | toUpper }} - {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        severity: critical
        description: '{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.description }}'

  - name: slack-warning
    slack_configs:
      - channel: '#alerts-warning'
        title: '⚠️ {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        footer: 'TRADINGO Monitoring'
        fields:
          - title: Service
            value: '{{ .GroupLabels.service }}'
            short: true
          - title: Severity
            value: '{{ .GroupLabels.severity }}'
            short: true

  - name: email-info
    email_configs:
      - to: 'ops@tradingo.com'
        from: 'monitoring@tradingo.com'
        smarthost: 'smtp.tradingo.com:587'
        auth_username: 'monitoring@tradingo.com'
        auth_password: '${SMTP_PASSWORD}'
        require_tls: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service']

  - source_match:
      severity: warning
    target_match:
      severity: info
    equal: ['alertname', 'service']
